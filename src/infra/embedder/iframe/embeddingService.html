<script type="module">
	import { env, pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.0';

	env.allowLocalModels = false;

	class DocumentEmbeddingController {
		#pipeline = null;
		#device = 'wasm';
		#queue = Promise.resolve();  // serialize all inference calls

		constructor() {
			this.ready = this.#initializeModel();
		}

		async #initializeModel() {
			const webgpuAvailable = navigator.gpu != null;
			this.#device = webgpuAvailable ? 'webgpu' : 'wasm';

			console.log(`[Similarity] Initializing on ${this.#device}`);

			this.#pipeline = await pipeline(
				'feature-extraction',
				'Xenova/all-MiniLM-L6-v2',
				{
					device: this.#device,
					dtype: webgpuAvailable ? 'fp32' : 'q8',
				}
			);

			console.log(`[Similarity] Model ready on ${this.#device}`);
		}

		async generateDocumentEmbedding(text) {
			await this.ready;
			const input = text.trim();
			if (!input) return null;

			// enqueue — each call waits for the previous to finish
			return new Promise((resolve, reject) => {
				this.#queue = this.#queue.then(async () => {
					try {
						const result = await this.#pipeline(input, {pooling: 'mean', normalize: true});
						resolve(result.data);
					} catch (err) {
						reject(err);
					}
				});
			});
		}

		getDevice() {
			return this.#device;
		}
	}

	const embedder = new DocumentEmbeddingController();

	window.addEventListener('message', async (event) => {
		const {requestId, payload} = event.data;

		if (payload === 'ping') {
			await embedder.ready;
			event.source.postMessage(
				{requestId, data: [], device: embedder.getDevice()},
				window.origin
			);
			return;
		}

		try {
			const features = await embedder.generateDocumentEmbedding(payload);
      event.source.postMessage({ requestId, data: features ? Array.from(features) : [] }, window.origin);
		} catch (error) {
			const message = error instanceof Error ? error.message : String(error);
      event.source.postMessage({ requestId, data: [], error: message }, window.origin);
		}
	});
</script>
